<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H&S Developer | Premium 3D</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js CDN Link (This replaces local installation) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">H&S <span style="color: #dc2626;">DEVELOPER</span></div>
        <button class="cta-btn">Get Started</button>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Design Your <span style="color: #dc2626;">Premium</span> Space.</h1>
            <p>Advanced 3D architectural solutions for modern developments.</p>
            <button class="cta-btn">Calculate Estimate</button>
        </div>
        
        <div class="canvas-container">
            <!-- JavaScript will automatically inject the 3D canvas here -->
            <div id="canvas-wrapper"></div>
        </div>
    </section>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
